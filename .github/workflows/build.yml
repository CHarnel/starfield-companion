name: Build App

on:
  workflow_dispatch:
    inputs:
      platform:
        type: choice
        description: Platform to build for
        options:
          - android
          - ios
          - all
      profile:
        type: choice
        description: Build profile
        options:
          - development
          - development-device
          - preview
          - production
      submit:
        type: boolean
        description: Submit to App Store / Play Store after build
        default: false

jobs:
  build_android:
    name: Build Android (${{ inputs.profile }})
    if: inputs.platform == 'android' || inputs.platform == 'all'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build Android
        run: |
          eas build --local --non-interactive \
            --platform android \
            --profile ${{ inputs.profile }} \
            --output ./app-build.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ inputs.profile }}
          path: ./app-build.apk

  build_ios:
    name: Build iOS (${{ inputs.profile }})
    if: inputs.platform == 'ios' || inputs.platform == 'all'
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Build iOS
        run: |
          if [ "${{ inputs.profile }}" = "development" ]; then
            EXT="tar.gz"
          else
            EXT="ipa"
          fi
          eas build --local --non-interactive \
            --platform ios \
            --profile ${{ inputs.profile }} \
            --output "./app-build.${EXT}"
          echo "BUILD_OUTPUT=./app-build.${EXT}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-${{ inputs.profile }}
          path: ${{ env.BUILD_OUTPUT }}

  distribute_android:
    name: Distribute Android (${{ inputs.profile }})
    needs: build_android
    if: inputs.profile == 'preview'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: android-${{ inputs.profile }}

      - name: Upload to Diawi
        id: diawi
        uses: rnkdsh/action-upload-diawi@v1.5.12
        with:
          token: ${{ secrets.DIAWI_TOKEN }}
          file: ./app-build.apk
          comment: "${{ inputs.profile }} build #${{ github.run_number }}"

      - name: Print install link
        run: |
          echo "### Android Install Link" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.diawi.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**QR:** ${{ steps.diawi.outputs.qrcode }}" >> $GITHUB_STEP_SUMMARY

  distribute_ios:
    name: Distribute iOS (${{ inputs.profile }})
    needs: build_ios
    if: inputs.profile != 'production' && inputs.profile != 'development'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-${{ inputs.profile }}

      - name: Upload to Diawi
        id: diawi
        uses: rnkdsh/action-upload-diawi@v1.5.12
        with:
          token: ${{ secrets.DIAWI_TOKEN }}
          file: ./app-build.ipa
          comment: "${{ inputs.profile }} build #${{ github.run_number }}"

      - name: Print install link
        run: |
          echo "### iOS Install Link" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.diawi.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "**QR:** ${{ steps.diawi.outputs.qrcode }}" >> $GITHUB_STEP_SUMMARY

  submit_android:
    name: Submit Android to Play Store
    needs: build_android
    if: inputs.submit && inputs.profile == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: android-${{ inputs.profile }}

      - name: Submit to Play Store
        run: eas submit --platform android --profile production --path ./app-build.apk --non-interactive

  submit_ios:
    name: Submit iOS to App Store
    needs: build_ios
    if: inputs.submit && inputs.profile == 'production'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-${{ inputs.profile }}

      - name: Submit to App Store
        run: eas submit --platform ios --profile production --path ./app-build.ipa --non-interactive
