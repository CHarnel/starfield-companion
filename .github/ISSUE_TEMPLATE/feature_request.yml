name: Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea to make the app better? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: A clear description of the feature or improvement.
      placeholder: "e.g. Add a favorites list so I can bookmark items"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Is this related to a frustration or limitation you've encountered?
      placeholder: "e.g. I keep searching for the same weapons over and over"

  - type: dropdown
    id: area
    attributes:
      label: Area of the app
      options:
        - Database (browse / search categories)
        - Locator (resource locator)
        - Explore (star map / planets)
        - Skills (skill trees)
        - Crafting (recipes / stations)
        - Item detail views
        - General / Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you thought of other ways this could work?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, screenshots, links, or anything else that helps explain your idea.
